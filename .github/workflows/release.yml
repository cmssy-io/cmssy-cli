name: Release

# Publishes @cmssy/cli to npm.
# Trigger by pushing a version tag (e.g. `git tag v1.0.0 && git push --tags`)
# or manually via the Actions tab. Requires an npm Automation access token
# (bypasses 2FA) stored as the `NPM_TOKEN` repository secret.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          v=$(node -p "require('./package.json').version")
          if [ "$tag" != "$v" ]; then
            echo "::error::tag v$tag does not match @cmssy/cli@$v"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run typecheck

      - run: pnpm test

      # Skips publishing when the current version is already on npm, so re-runs
      # are safe.
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already on npm — skipping"
          else
            echo "Publishing $name@$version"
            pnpm publish --access public --no-git-checks
          fi
